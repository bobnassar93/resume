<section id="contact" class="contact">
  <div class="container">

    <div class="section-title">
      <h2>Contact</h2>
    </div>

    <div class="row" data-aos="fade-in">

      <div class="col-lg-5 d-flex align-items-stretch">
        <div class="info">
          <div class="address">
            <i class="bi bi-geo-alt"></i>
            <h4>Location:</h4>
            <p>Wadi Street, Kousba El-Koura, North Lebanon</p>
          </div>

          <div class="email">
            <i class="bi bi-envelope"></i>
            <h4>Email:</h4>
            <p><a href="mailto:nassarbob@outlook.com">nassarbob@outlook.com</a></p>
          </div>

          <div class="phone">
            <i class="bi bi-phone"></i>
            <h4>Call:</h4>
            <p><a href="tel:+96171725044">+961 71 72 50 44</a></p>
          </div>

          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d9056.962035709028!2d35.852557027608896!3d34.30084330351993!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzTCsDE3JzU3LjkiTiAzNcKwNTEnMTAuMiJF!5e0!3m2!1sen!2slb!4v1631102737401!5m2!1sen!2slb"
            frameborder="0" style="border:0; width: 100%; height: 290px;" allowfullscreen loading="lazy"></iframe>
        </div>

      </div>

      <div class="col-lg-7 mt-5 mt-lg-0 d-flex align-items-stretch">
        <div class="email-form">
          <div class="row">
            <div class="form-group col-md-6">
              <label for="name">Full name</label>
              <input type="text" name="name" class="form-control" id="name" [formControl]="name" required>
              <span class="text-danger" *ngIf="nameValidationMessage !== ''">{{nameValidationMessage}}</span>
            </div>
            <div class="form-group col-md-6">
              <label for="name">Email</label>
              <input type="email" class="form-control" name="email" id="email" [formControl]="email" required>
              <span class="text-danger" *ngIf="emailValidationMessage !== ''">{{emailValidationMessage}}</span>
            </div>
          </div>
          <div class="form-group">
            <label for="name">Subject</label>
            <input type="text" class="form-control" name="subject" id="subject" [formControl]="subject" required>
            <span class="text-danger" *ngIf="subjectValidationMessage !== ''">{{subjectValidationMessage}}</span>
          </div>
          <div class="form-group">
            <label for="name">Message</label>
            <textarea class="form-control" name="message" rows="10" [formControl]="message" required></textarea>
            <span class="text-danger" *ngIf="messageValidationMessage !== ''">{{messageValidationMessage}}</span>
          </div>
          <div class="my-3">
            <div class="loading">Loading</div>
            <div class="error-message"></div>
            <div class="sent-message">Your message has been sent. Thank you!</div>
          </div>
          <div class="text-center">
            <button type="submit" (click)="sendMessage()" [disabled]="sending">
              <span *ngIf="!sending">
                Send Message
              </span>
              <div class="lds-ellipsis" *ngIf="sending">
                <div></div>
                <div></div>
                <div></div>
                <div></div>
              </div>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
